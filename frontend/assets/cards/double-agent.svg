<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#9a1515"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9a1515" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="240" height="300" fill="url(#bg)"/>
  <rect width="240" height="300" fill="url(#glow)"/>
  <!-- Moon / night atmosphere -->
  <circle cx="195" cy="35" r="22" fill="#fbbf24" opacity="0.6"/>
  <circle cx="205" cy="28" r="18" fill="#9a1515"/>
  <!-- Stars -->
  <text x="25" y="40" font-size="10" fill="rgba(251,191,36,0.7)">★</text>
  <text x="50" y="22" font-size="8" fill="rgba(251,191,36,0.5)">★</text>
  <text x="150" y="30" font-size="7" fill="rgba(251,191,36,0.4)">★</text>
  <!-- Shadow on ground -->
  <ellipse cx="115" cy="293" rx="70" ry="9" fill="#7f1d1d" opacity="0.7"/>
  <!-- Trench coat body -->
  <rect x="65" y="185" width="100" height="115" fill="#7f1d1d" rx="10"/>
  <!-- Coat collar/lapels -->
  <polygon points="120,185 95,210 110,300 120,270" fill="#991b1b"/>
  <polygon points="120,185 145,210 130,300 120,270" fill="#991b1b"/>
  <!-- Belt -->
  <rect x="75" y="235" width="90" height="10" fill="#92400e" rx="3"/>
  <rect x="114" y="232" width="12" height="16" fill="#d97706" rx="2"/>
  <!-- Left arm holding card behind back -->
  <ellipse cx="60" cy="228" rx="20" ry="45" fill="#7f1d1d" transform="rotate(-10 60 228)"/>
  <!-- Right arm (open, welcoming gesture) -->
  <ellipse cx="180" cy="220" rx="20" ry="40" fill="#7f1d1d" transform="rotate(8 180 220)"/>
  <!-- Hands -->
  <ellipse cx="52" cy="265" rx="14" ry="11" fill="#d4845a"/>
  <ellipse cx="188" cy="248" rx="14" ry="11" fill="#d4845a"/>
  <!-- Hidden cards behind back -->
  <rect x="28" y="250" width="22" height="30" fill="#fbbf24" rx="3" transform="rotate(15 28 250)"/>
  <rect x="35" y="248" width="22" height="30" fill="#f87171" rx="3" transform="rotate(5 35 248)"/>
  <!-- Fox head -->
  <ellipse cx="118" cy="135" rx="52" ry="55" fill="#d4845a"/>
  <!-- Fox ears (pointed) -->
  <polygon points="82,100 72,45 112,92" fill="#d4845a"/>
  <polygon points="154,100 164,45 128,92" fill="#d4845a"/>
  <polygon points="84,98 78,58 108,90" fill="#c0392b" opacity="0.8"/>
  <polygon points="152,98 158,58 132,90" fill="#c0392b" opacity="0.8"/>
  <!-- White muzzle area -->
  <ellipse cx="118" cy="155" rx="30" ry="22" fill="#fde8d0"/>
  <!-- Eye mask (spy mask) -->
  <rect x="78" y="118" width="68" height="20" fill="#1a0a00" rx="10"/>
  <!-- Eyes through mask -->
  <ellipse cx="100" cy="128" rx="10" ry="9" fill="#fbbf24"/>
  <ellipse cx="136" cy="128" rx="10" ry="9" fill="#fbbf24"/>
  <ellipse cx="100" cy="128" rx="6" ry="7" fill="#1a0a00"/>
  <ellipse cx="136" cy="128" rx="6" ry="7" fill="#1a0a00"/>
  <ellipse cx="102" cy="126" rx="2.5" ry="2.5" fill="white"/>
  <ellipse cx="138" cy="126" rx="2.5" ry="2.5" fill="white"/>
  <!-- Wink (right eye closed) -->
  <path d="M 126 126 Q 136 122 146 126" stroke="#1a0a00" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="118" cy="150" rx="8" ry="6" fill="#7f1d1d"/>
  <!-- Sly smile -->
  <path d="M 105 160 Q 118 172 131 160" stroke="#7f1d1d" stroke-width="2.5" fill="#fde8d0"/>
  <!-- Whiskers -->
  <line x1="88" y1="152" x2="58" y2="145" stroke="#7f1d1d" stroke-width="1.5" opacity="0.6"/>
  <line x1="88" y1="157" x2="58" y2="157" stroke="#7f1d1d" stroke-width="1.5" opacity="0.6"/>
  <line x1="148" y1="152" x2="178" y2="145" stroke="#7f1d1d" stroke-width="1.5" opacity="0.6"/>
  <line x1="148" y1="157" x2="178" y2="157" stroke="#7f1d1d" stroke-width="1.5" opacity="0.6"/>
  <!-- Hat -->
  <ellipse cx="118" cy="88" rx="55" ry="10" fill="#1a0a00"/>
  <rect x="75" y="55" width="86" height="35" fill="#1a0a00" rx="5"/>
  <!-- Hat band -->
  <rect x="75" y="80" width="86" height="8" fill="#c0392b"/>
</svg>
