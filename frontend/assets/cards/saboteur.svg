<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="240" height="300" fill="url(#bg)"/>
  <rect width="240" height="300" fill="url(#glow)"/>
  <!-- Atmospheric smoke/fog -->
  <ellipse cx="60" cy="260" rx="80" ry="30" fill="#1f2937" opacity="0.8"/>
  <ellipse cx="170" cy="280" rx="60" ry="20" fill="#1f2937" opacity="0.6"/>
  <!-- Ground -->
  <ellipse cx="118" cy="296" rx="72" ry="9" fill="#030712" opacity="0.8"/>
  <!-- Shadow body -->
  <ellipse cx="118" cy="255" rx="62" ry="80" fill="#0f1117" opacity="0.6"/>
  <!-- Ninja/black outfit body -->
  <ellipse cx="118" cy="225" rx="55" ry="70" fill="#111827"/>
  <rect x="63" y="180" width="110" height="100" fill="#111827" rx="10"/>
  <!-- Left arm (behind) -->
  <ellipse cx="58" cy="225" rx="18" ry="42" fill="#0d1117" transform="rotate(-12 58 225)"/>
  <!-- Right arm (throwing shuriken) -->
  <ellipse cx="185" cy="210" rx="18" ry="40" fill="#0d1117" transform="rotate(25 185 210)"/>
  <!-- Gloves -->
  <ellipse cx="50" cy="262" rx="14" ry="11" fill="#1f2937"/>
  <ellipse cx="196" cy="238" rx="14" ry="11" fill="#1f2937"/>
  <!-- Shuriken -->
  <g transform="translate(205,225) rotate(30)">
    <polygon points="0,-18 5,-5 18,0 5,5 0,18 -5,5 -18,0 -5,-5" fill="#6366f1" opacity="0.9"/>
  </g>
  <!-- Cat/raccoon head - masked -->
  <ellipse cx="118" cy="128" rx="52" ry="55" fill="#374151"/>
  <!-- Cat ears -->
  <polygon points="82,93 74,48 110,87" fill="#374151"/>
  <polygon points="154,93 162,48 128,87" fill="#374151"/>
  <polygon points="85,91 80,62 107,85" fill="#1f2937"/>
  <polygon points="151,91 156,62 131,85" fill="#1f2937"/>
  <!-- Head wrap / ninja mask -->
  <rect x="66" y="90" width="104" height="85" fill="#0d1117" rx="8" opacity="0.9"/>
  <!-- Eyes exposed (glowing) -->
  <ellipse cx="100" cy="130" rx="14" ry="10" fill="#4f46e5"/>
  <ellipse cx="136" cy="130" rx="14" ry="10" fill="#4f46e5"/>
  <ellipse cx="100" cy="130" rx="8" ry="7" fill="#312e81"/>
  <ellipse cx="136" cy="130" rx="8" ry="7" fill="#312e81"/>
  <ellipse cx="102" cy="128" rx="3" ry="3" fill="rgba(165,180,252,0.9)"/>
  <ellipse cx="138" cy="128" rx="3" ry="3" fill="rgba(165,180,252,0.9)"/>
  <!-- Eye glow effect -->
  <ellipse cx="100" cy="130" rx="16" ry="12" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="136" cy="130" rx="16" ry="12" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>
  <!-- Face wrapping below eyes -->
  <rect x="66" y="140" width="104" height="36" fill="#0d1117" rx="5"/>
  <!-- Belt with pouches -->
  <rect x="73" y="230" width="90" height="12" fill="#1f2937" rx="3"/>
  <rect x="80" y="226" width="16" height="20" fill="#111827" rx="3"/>
  <rect x="100" y="226" width="16" height="20" fill="#111827" rx="3"/>
  <rect x="120" y="226" width="16" height="20" fill="#111827" rx="3"/>
  <!-- Purple shimmer lines on outfit -->
  <line x1="90" y1="185" x2="90" y2="225" stroke="#4f46e5" stroke-width="1" opacity="0.3"/>
  <line x1="148" y1="185" x2="148" y2="225" stroke="#4f46e5" stroke-width="1" opacity="0.3"/>
  <!-- Floating particles -->
  <circle cx="40" cy="180" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="195" cy="150" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="30" cy="120" r="2" fill="#818cf8" opacity="0.3"/>
  <circle cx="210" cy="260" r="3" fill="#6366f1" opacity="0.4"/>
</svg>
