<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>TAG! — Admin Panel</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --green: #3fb950; --blue: #58a6ff; --yellow: #d29922;
      --red: #f85149; --purple: #bc8cff; --text: #e6edf3; --muted: #8b949e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; background: var(--bg); color: var(--text); font-size: 13px; }

    #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
    #auth-screen h1 { color: var(--green); font-size: 1.6rem; }
    #auth-screen input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 6px; font-size: 1rem; width: 280px; outline: none; }
    #auth-screen input:focus { border-color: var(--blue); }
    #auth-screen button { background: var(--green); color: #000; border: none; padding: 10px 28px; border-radius: 6px; font-weight: 700; font-size: 1rem; cursor: pointer; }
    #auth-error { color: var(--red); font-size: .85rem; }

    #panel { display: none; flex-direction: column; min-height: 100vh; }

    /* Top bar */
    #topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; }
    #topbar h1 { color: var(--green); font-size: 1rem; letter-spacing: .08em; }
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 12px; font-size: .78rem; font-weight: 700; }
    .badge-green { background: rgba(63,185,80,.18); color: var(--green); border: 1px solid rgba(63,185,80,.3); }
    .badge-blue  { background: rgba(88,166,255,.18); color: var(--blue);  border: 1px solid rgba(88,166,255,.3); }
    .badge-yellow{ background: rgba(210,153,34,.18);  color: var(--yellow); border: 1px solid rgba(210,153,34,.3); }
    .badge-red   { background: rgba(248,81,73,.18);   color: var(--red);   border: 1px solid rgba(248,81,73,.3); }
    #refresh-info { margin-left: auto; color: var(--muted); font-size: .75rem; }
    #topbar button { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 4px 12px; border-radius: 5px; cursor: pointer; font-size: .8rem; }
    #topbar button:hover { background: var(--border); }

    /* Layout */
    #content { display: grid; grid-template-columns: 320px 1fr; gap: 0; flex: 1; min-height: 0; }

    /* Left panel */
    #left-panel { border-right: 1px solid var(--border); overflow-y: auto; }
    .panel-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .panel-section h2 { color: var(--muted); font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }

    /* Sessions */
    .session-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(48,54,61,.5); }
    .session-row:last-child { border-bottom: none; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-gray { background: var(--muted); }
    .session-name { color: var(--text); font-weight: 600; }
    .session-ip { color: var(--muted); font-size: .72rem; }
    .session-age { color: var(--muted); font-size: .7rem; margin-left: auto; }

    /* Room cards */
    .room-card { padding: 10px 12px; margin-bottom: 6px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: border-color .15s, background .15s; }
    .room-card:hover, .room-card.active { border-color: var(--blue); background: rgba(88,166,255,.06); }
    .room-card .room-title { font-weight: 700; color: var(--blue); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .room-card .room-meta { color: var(--muted); font-size: .72rem; display: flex; gap: 10px; flex-wrap: wrap; }
    .room-card.in-game .room-title { color: var(--green); }
    .lock-icon { color: var(--yellow); font-size: .7rem; }

    /* Right panel — detail view */
    #right-panel { overflow-y: auto; padding: 20px; }
    #detail-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: .9rem; flex-direction: column; gap: 8px; }
    #detail-placeholder .big { font-size: 2.5rem; }

    /* Game state display */
    .game-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .game-header h2 { color: var(--green); font-size: 1.1rem; }
    .phase-tag { padding: 2px 10px; border-radius: 10px; font-size: .75rem; font-weight: 700; background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.3); }

    .section-title { color: var(--muted); font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; margin: 14px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }

    /* Player cards in detail */
    .player-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
    .player-detail { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .player-detail.active-turn { border-color: var(--green); }
    .player-detail.disconnected { border-color: var(--red); opacity: .7; }
    .player-name { font-weight: 700; font-size: .95rem; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .player-pos { color: var(--muted); font-size: .75rem; margin-bottom: 6px; }
    .card-list { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0; }
    .card-chip { padding: 2px 7px; border-radius: 4px; font-size: .72rem; font-weight: 600; background: rgba(88,166,255,.12); color: var(--blue); border: 1px solid rgba(88,166,255,.25); }
    .card-chip.recruited { background: rgba(63,185,80,.12); color: var(--green); border-color: rgba(63,185,80,.25); }
    .card-chip.face-up { background: rgba(210,153,34,.12); color: var(--yellow); border-color: rgba(210,153,34,.25); }

    /* Timer */
    .timer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; }
    .timer-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
    .timer-label { color: var(--muted); font-size: .7rem; text-transform: uppercase; letter-spacing: .08em; }
    .timer-value { font-size: 1.2rem; font-weight: 900; color: var(--text); margin-top: 2px; font-variant-numeric: tabular-nums; }
    .timer-value.warn { color: var(--yellow); }
    .timer-value.danger { color: var(--red); }

    /* Pending play */
    .pending-box { background: var(--surface); border: 1px solid var(--yellow); border-radius: 8px; padding: 12px; margin-top: 10px; }
    .pending-box .label { color: var(--yellow); font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }

    /* Deck preview */
    .deck-preview { font-size: .75rem; color: var(--muted); }
    .deck-preview span { color: var(--blue); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    @media (max-width: 700px) {
      #content { grid-template-columns: 1fr; }
      #left-panel { border-right: none; border-bottom: 1px solid var(--border); max-height: 50vh; }
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <h1>⚙️ TAG! Admin</h1>
  <p style="color:var(--muted)">Enter the admin password to continue</p>
  <input id="admin-pass" type="password" placeholder="Admin password" autocomplete="off"/>
  <button onclick="doAuth()">Enter</button>
  <span id="auth-error"></span>
</div>

<!-- PANEL -->
<div id="panel">
  <div id="topbar">
    <h1>⚙️ TAG! Admin Panel</h1>
    <span id="badge-sessions" class="badge badge-blue">0 sessions</span>
    <span id="badge-rooms"    class="badge badge-green">0 rooms</span>
    <span id="badge-ingame"   class="badge badge-yellow">0 in game</span>
    <span id="refresh-info">auto-refresh 3s</span>
    <button onclick="forceRefresh()">↻ Refresh</button>
    <button onclick="logout()" style="color:var(--red)">Logout</button>
  </div>

  <div id="content">
    <!-- LEFT: sessions + room list -->
    <div id="left-panel">
      <div class="panel-section" id="sessions-section">
        <h2>Connected Players</h2>
        <div id="sessions-list"><span style="color:var(--muted)">Loading…</span></div>
      </div>
      <div class="panel-section" id="rooms-section">
        <h2>Rooms</h2>
        <div id="rooms-list"><span style="color:var(--muted)">No active rooms</span></div>
      </div>
    </div>

    <!-- RIGHT: room detail / spectate -->
    <div id="right-panel">
      <div id="detail-placeholder">
        <div class="big">🎮</div>
        <div>Click a room on the left to spectate</div>
      </div>
      <div id="room-detail" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
  let adminPass = "";
  let selectedRoomId = null;
  let refreshTimer = null;

  // ── Auth ──────────────────────────────────────────────────────────────────
  document.getElementById("admin-pass").addEventListener("keydown", e => {
    if (e.key === "Enter") doAuth();
  });

  async function doAuth() {
    const pass = document.getElementById("admin-pass").value;
    const res = await fetch("/api/admin/status", { headers: { "X-Admin-Password": pass } });
    if (res.ok) {
      adminPass = pass;
      document.getElementById("auth-screen").style.display = "none";
      document.getElementById("panel").style.display = "flex";
      startAutoRefresh();
      refresh();
    } else {
      document.getElementById("auth-error").textContent = "Wrong password";
    }
  }

  function logout() {
    adminPass = "";
    clearInterval(refreshTimer);
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("panel").style.display = "none";
    document.getElementById("admin-pass").value = "";
  }

  // ── Auto-refresh ──────────────────────────────────────────────────────────
  function startAutoRefresh() {
    clearInterval(refreshTimer);
    refreshTimer = setInterval(refresh, 3000);
  }

  async function forceRefresh() { await refresh(); }

  async function refresh() {
    await Promise.all([fetchStatus(), selectedRoomId ? fetchRoom(selectedRoomId) : Promise.resolve()]);
  }

  async function apiFetch(path) {
    const r = await fetch(path, { headers: { "X-Admin-Password": adminPass } });
    if (r.status === 403) { logout(); return null; }
    if (!r.ok) return null;
    return r.json();
  }

  // ── Status + rooms ────────────────────────────────────────────────────────
  async function fetchStatus() {
    const [status, rooms] = await Promise.all([
      apiFetch("/api/admin/status"),
      apiFetch("/api/admin/rooms"),
    ]);
    if (!status || !rooms) return;

    document.getElementById("badge-sessions").textContent = `${status.sessions_active} sessions`;
    document.getElementById("badge-rooms").textContent    = `${status.rooms_active} rooms`;
    document.getElementById("badge-ingame").textContent   = `${status.rooms_in_game} in game`;

    // Sessions
    const sl = document.getElementById("sessions-list");
    if (status.sessions.length === 0) {
      sl.innerHTML = `<span style="color:var(--muted);font-size:.8rem;">No players connected</span>`;
    } else {
      sl.innerHTML = status.sessions.map(s => `
        <div class="session-row">
          <div class="dot dot-green"></div>
          <div>
            <div class="session-name">${esc(s.player_name)}</div>
            <div class="session-ip">${esc(s.ip)} · ${esc(s.token_prefix)}…</div>
          </div>
          <div class="session-age">${fmtAge(s.age_seconds)}</div>
        </div>`).join("");
    }

    // Rooms
    const rl = document.getElementById("rooms-list");
    if (rooms.rooms.length === 0) {
      rl.innerHTML = `<span style="color:var(--muted);font-size:.8rem;">No active rooms</span>`;
    } else {
      rl.innerHTML = rooms.rooms.map(r => {
        const inGame = r.state_summary != null;
        const turn   = r.state_summary ? `Turn ${r.state_summary.turn_number} · ${r.state_summary.phase}` : "Lobby";
        const players = r.players.map(p =>
          `<span style="color:${p.connected ? "var(--green)" : "var(--red)"}">●</span> ${esc(p.player_name)}`
        ).join("  ");
        const lock = r.has_password ? `<span class="lock-icon">🔒</span>` : "";
        return `<div class="room-card${inGame ? " in-game" : ""}${r.room_id === selectedRoomId ? " active" : ""}"
                  onclick="selectRoom('${r.room_id}')">
          <div class="room-title">${lock}${esc(r.room_name)} <span style="color:var(--muted);font-size:.72rem;">#${r.room_id}</span></div>
          <div class="room-meta">
            <span>${esc(r.mode)}</span>
            <span>${r.players.filter(p=>p.connected).length}/${r.max_players} players</span>
            <span>${turn}</span>
            <span style="font-size:.68rem;">${players}</span>
          </div>
        </div>`;
      }).join("");
    }
  }

  // ── Room detail (spectate) ────────────────────────────────────────────────
  function selectRoom(roomId) {
    selectedRoomId = roomId;
    fetchRoom(roomId);
  }

  async function fetchRoom(roomId) {
    const data = await apiFetch(`/api/admin/room/${roomId}`);
    if (!data) return;

    document.getElementById("detail-placeholder").style.display = "none";
    const el = document.getElementById("room-detail");
    el.style.display = "block";

    if (!data.state) {
      el.innerHTML = `<div class="game-header"><h2>🏠 ${esc(data.room_name)}</h2></div>
        <p style="color:var(--muted)">Game not started yet — players in lobby.</p>`;
      return;
    }

    const s = data.state;
    const now = Date.now() / 1000;
    const timer = s.timer;
    const activeIdx = s.active_player_index;

    // Players
    const playersHtml = s.players.map((p, idx) => {
      const isActive = idx === activeIdx && !s.is_finished;
      const isDisconnected = !p.connected;
      const cls = isDisconnected ? "player-detail disconnected" : (isActive ? "player-detail active-turn" : "player-detail");
      const handChips = p.hand.map(c => `<span class="card-chip">${esc(c)}</span>`).join("");
      const recChips = p.recruited.map(c => `<span class="card-chip recruited">${esc(c)}</span>`).join("");
      const timeUsed = timer.player_time_used[p.id] ?? 0;
      const timeLimit = timer.player_time_limit ?? 900;
      const timeLeft = Math.max(0, timeLimit - timeUsed);
      const timeColor = timeLeft < 120 ? "danger" : timeLeft < 300 ? "warn" : "";
      const status = isDisconnected
        ? `<span style="color:var(--red)">⚠ DISCONNECTED (skips: ${p.skip_turns}/${3})</span>`
        : (isActive ? "<span style='color:var(--green)'>▶ Active turn</span>" : "");
      return `<div class="${cls}">
        <div class="player-name">
          <span style="color:${p.connected ? "var(--green)" : "var(--red)"}">●</span>
          ${esc(p.name)}
          ${p.team ? `<span class="badge badge-blue" style="font-size:.65rem;">${p.team}</span>` : ""}
          ${p.eliminated ? `<span class="badge badge-red" style="font-size:.65rem;">ELIM</span>` : ""}
        </div>
        <div class="player-pos">
          Pos: <b>${p.position}</b> · Home: ${p.home_position} · Steps: ${p.total_steps}
          · Discards: ${p.discards_used}/${p.max_discards}
        </div>
        ${status ? `<div style="font-size:.72rem;margin-bottom:4px;">${status}</div>` : ""}
        <div style="font-size:.72rem;color:var(--muted);margin-bottom:2px;">Hand:</div>
        <div class="card-list">${handChips || '<span style="color:var(--muted)">empty</span>'}</div>
        <div style="font-size:.72rem;color:var(--muted);margin:4px 0 2px;">Recruited:</div>
        <div class="card-list">${recChips || '<span style="color:var(--muted)">none</span>'}</div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:6px;">
          Time left: <span class="${timeColor}">${fmtTime(timeLeft)}</span>
        </div>
      </div>`;
    }).join("");

    // Pending play
    const pendingHtml = s.pending_play ? `
      <div class="pending-box">
        <div class="label">⚡ Pending Play — awaiting recruit</div>
        <div>Actor: <b style="color:var(--blue)">${esc(playerName(s, s.pending_play.actor_id))}</b></div>
        <div class="card-list" style="margin-top:6px;">
          <span class="card-chip face-up">↑ ${esc(s.pending_play.face_up)}</span>
          <span class="card-chip">↓ ${esc(s.pending_play.face_down)}</span>
          ${s.pending_play.target_id ? `<span style="color:var(--muted);font-size:.72rem;">→ target: ${esc(playerName(s, s.pending_play.target_id))}</span>` : ""}
        </div>
      </div>` : "";

    // Timers
    const gameElapsed = timer.game_elapsed_s ?? 0;
    const gameLimit = timer.game_time_limit ?? 1800;
    const gameLeft = Math.max(0, gameLimit - gameElapsed);
    const turnLeft = timer.turn_active && timer.turn_start
      ? Math.max(0, (timer.turn_time_limit ?? 120) - (now - timer.turn_start))
      : null;
    const timersHtml = `
      <div class="timer-grid">
        <div class="timer-cell">
          <div class="timer-label">Game time left</div>
          <div class="timer-value ${gameLeft < 300 ? "danger" : ""}">${fmtTime(gameLeft)}</div>
        </div>
        <div class="timer-cell">
          <div class="timer-label">Turn time left</div>
          <div class="timer-value ${turnLeft != null && turnLeft < 30 ? "danger" : ""}">${turnLeft != null ? fmtTime(turnLeft) : "–"}</div>
        </div>
        <div class="timer-cell">
          <div class="timer-label">Turn #</div>
          <div class="timer-value">${s.turn_number}</div>
        </div>
        <div class="timer-cell">
          <div class="timer-label">Deck left</div>
          <div class="timer-value">${s.deck_remaining}</div>
        </div>
      </div>`;

    el.innerHTML = `
      <div class="game-header">
        <h2>🎮 ${esc(data.room_name)}</h2>
        <span class="phase-tag">${s.phase}</span>
        ${s.result ? `<span class="badge badge-red">GAME OVER</span>` : ""}
        <span style="color:var(--muted);font-size:.75rem;">mode: ${esc(data.mode)} · #${data.room_id}</span>
      </div>

      ${s.result ? `<div style="background:rgba(248,81,73,.12);border:1px solid var(--red);border-radius:8px;padding:12px;margin-bottom:14px;">
        <b style="color:var(--red)">Game Over</b> · Winner: <b>${esc(playerName(s, s.result.winner_id))}</b>
        · Reason: ${esc(s.result.reason)}
      </div>` : ""}

      <div class="section-title">Timers</div>
      ${timersHtml}

      ${pendingHtml}

      <div class="section-title">Players</div>
      <div class="player-grid">${playersHtml}</div>

      <div class="section-title">Deck preview (top 5)</div>
      <div class="deck-preview">
        ${s.deck_top5.length ? s.deck_top5.map(c => `<span>${esc(c)}</span>`).join(" · ") : "<i>empty</i>"}
        <span> … ${s.deck_remaining} total</span>
      </div>
    `;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function esc(s) {
    if (s == null) return "—";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function fmtTime(s) {
    s = Math.max(0, Math.ceil(s));
    return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  }

  function fmtAge(s) {
    if (s < 60) return `${s}s`;
    if (s < 3600) return `${Math.floor(s/60)}m`;
    return `${Math.floor(s/3600)}h`;
  }

  function playerName(state, id) {
    if (!id) return "—";
    const p = state.players.find(p => p.id === id);
    return p ? p.name : id.slice(0, 8);
  }
</script>
</body>
</html>
